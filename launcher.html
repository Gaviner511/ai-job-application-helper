<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Application Helper</title>
    <link rel="stylesheet" href="launcher.css" />
    <link rel="stylesheet" href="ui_theme.css" />
  </head>
  <body>
    <main>
      <p class="eyebrow">JOB APPLICATION HELPER</p>
      <h1>Workspace</h1>
      <p id="launcher-status" class="muted">Open one clean right-side workspace for autofill and resume tailoring.</p>
      <section class="card launcher-actions">
        <button id="start-helper" type="button">Start workspace</button>
        <button id="stop-helper" class="secondary" type="button">Stop workspace</button>
      </section>
      <section class="card launcher-actions">
        <button id="open-full-helper" class="secondary" type="button">Open helper tab</button>
        <button id="open-profile" class="secondary" type="button">Profile Manager</button>
        <button id="open-tailor" class="secondary" type="button">Resume Tailor</button>
        <button id="open-job-finder" class="secondary" type="button">Job Finder</button>
        <button id="open-settings" class="secondary" type="button">Settings</button>
      </section>
    </main>
    <script src="ui_theme.js"></script>
    <script src="launcher.js"></script>
  </body>
</html>
